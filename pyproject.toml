[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ambient-inference"
version = "0.1.1"
description = "Headless Maestro inference layer — open-weight routing and model council"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.32,<1",
    "httpx>=0.27,<1",
    "pydantic>=2.9,<3",
    "pyyaml>=6.0,<7",
    "sqlalchemy>=2.0,<3",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.2,<4"]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.24,<1",
]

[project.scripts]
validate-inference-registry = "ambient_inference.validate_registry:main"

[tool.setuptools.packages.find]
where = ["lib"]

[tool.setuptools.package-data]
ambient_inference = ["contracts/*.yaml", "default_config/*.yaml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "gpu: live Maestro/Ollama E2E (set MAESTRO_E2E_URL)",
]
