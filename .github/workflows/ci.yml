name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Sync bundled contracts and Maestro run artifact
        run: |
          cp contracts/*.yaml lib/ambient_contracts/bundled/
          cp contracts/maestro-run-v1.yaml lib/ambient_inference/contracts/maestro-run-v1.yaml
          git diff --exit-code lib/ambient_contracts/bundled/ lib/ambient_inference/contracts/maestro-run-v1.yaml || (
            echo "ERROR: bundled copies out of sync with contracts/" >&2
            exit 1
          )

      - name: Install package
        run: pip install -e ".[all]"

      - name: Validate contracts
        run: validate-contracts

      - name: Validate inference registry
        run: validate-inference-registry

      - name: Validate agent config
        run: validate-agent-config

      - name: Validate reference catalog
        run: |
          python scripts/harden_catalog_data_options.py --check
          python scripts/generate_reference_catalog.py --check --strict-data-option-inputs

      - name: Validate catalog crosswalk
        run: python scripts/check_crosswalk.py

      - name: Catalogue hygiene (no dead trees, no mojibake)
        run: python scripts/check_catalog_hygiene.py

      - name: Catalogue naming conventions
        run: python scripts/check_naming.py

      - name: Contract meta-schema and versions
        run: python scripts/check_contract_schema.py

      - name: Metric formulas
        run: python scripts/check_formulas.py

      - name: Metric input coverage (data options -> KPIs)
        run: python scripts/check_metric_inputs.py

      - name: PHI policy (healthcare/life-sciences)
        run: python scripts/check_phi.py

      - name: Check markdown prose (no pipe tables)
        run: python scripts/check_markdown_prose.py

      - name: Run pytest
        run: pytest
        env:
          AMBIENT_SPARK_TESTS: "1"

      - name: Wheel smoke (ambient_agent import)
        run: |
          pip wheel . -w dist --no-deps
          python -m venv /tmp/wheel-smoke-venv
          /tmp/wheel-smoke-venv/bin/pip install -q dist/ambient_core-*.whl
          /tmp/wheel-smoke-venv/bin/python -c "import ambient_agent; from ambient_agent.executor import execute"
