# Receives ambient_hub_sync from EngineerID/ambient-systems hub.
# Fetches mapped paths via GitHub API; opens a PR via create-pull-request.

name: Hub sync receiver

on:
  repository_dispatch:
    types:
      - ambient_hub_sync

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spoke repo
        uses: actions/checkout@v4

      - name: Fetch real files from hub
        env:
          HUB_TOKEN: ${{ secrets.HUB_FETCH_TOKEN }}
        run: |
          SRC_REPO="${{ github.event.client_payload.source_repo }}"
          if [ -z "$SRC_REPO" ]; then SRC_REPO="${{ github.event.client_payload.sourceRepo }}"; fi
          SRC_SHA="${{ github.event.client_payload.sha }}"
          if [ -z "$SRC_SHA" ]; then SRC_SHA="${{ github.event.client_payload.sourceSha }}"; fi
          echo "Authenticating to hub ($SRC_REPO) at commit $SRC_SHA"
          FILES_TO_SYNC=(
            "MAPPING.md:docs/hub/upstream-mapping.md"
            "company/strategy/03_data-product-contracts.md:docs/hub/data-product-contracts-intent.md"
          )
          for map in "${FILES_TO_SYNC[@]}"; do
            HUB_PATH="${map%%:*}"
            LOCAL_PATH="${map##*:}"
            echo "Fetching $HUB_PATH -> $LOCAL_PATH"
            mkdir -p "$(dirname "$LOCAL_PATH")"
            HTTP_STATUS=$(curl -s -w "%{http_code}" -o "$LOCAL_PATH" \
              -H "Authorization: token $HUB_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              -L "https://api.github.com/repos/$SRC_REPO/contents/$HUB_PATH?ref=$SRC_SHA")
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "Error fetching $HUB_PATH (HTTP $HTTP_STATUS). Check path or HUB_FETCH_TOKEN."
              exit 1
            fi
            echo "Synced $HUB_PATH"
          done

      - name: Create pull request for review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: chore: sync upstream from ambient-systems hub
          branch: hub-sync/${{ github.event.client_payload.sha || github.event.client_payload.sourceSha }}
          title: Hub sync updates from ambient-systems
          body: |
            Automated file sync triggered by the hub.
            Source repository: ${{ github.event.client_payload.source_repo || github.event.client_payload.sourceRepo }}
            Upstream commit: ${{ github.event.client_payload.sha || github.event.client_payload.sourceSha }}
            Rule ids: ${{ github.event.client_payload.ruleIds }}
            Review before merge.
