name: Hub sync receiver

on:
  repository_dispatch:
    types:
      - ambient_hub_sync

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve hub coordinates
        id: hub
        env:
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_REPO: ${{ github.event.client_payload.source_repo }}
        run: |
          SHORT="${PAYLOAD_SHA:0:7}"
          echo "repo=$PAYLOAD_REPO" >> "$GITHUB_OUTPUT"
          echo "sha=$PAYLOAD_SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Fetch real files from hub
        env:
          HUB_TOKEN: ${{ secrets.HUB_FETCH_TOKEN }}
        run: |
          SRC_REPO="${{ steps.hub.outputs.repo }}"
          SRC_SHA="${{ steps.hub.outputs.sha }}"
          FILES_TO_SYNC=(
            "MAPPING.md:docs/hub/upstream-mapping.md"
            "company/strategy/03_data-product-contracts.md:docs/hub/data-product-contracts-intent.md"
          )
          for map in "${FILES_TO_SYNC[@]}"; do
            HUB_PATH="${map%%:*}"
            LOCAL_PATH="${map##*:}"
            mkdir -p "$(dirname "$LOCAL_PATH")"
            HTTP_STATUS=$(curl -s -w "%{{http_code}}" -o "$LOCAL_PATH" \
              -H "Authorization: token $HUB_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              -L "https://api.github.com/repos/$SRC_REPO/contents/$HUB_PATH?ref=$SRC_SHA")
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "Error fetching $HUB_PATH HTTP $HTTP_STATUS"
              exit 1
            fi
          done

      - name: Create pull request for review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: chore: sync upstream from ambient-systems hub
          branch: hub-sync/${{ steps.hub.outputs.short }}
          title: Hub sync updates from ambient-systems
          body: |
            Hub sync from ${{ steps.hub.outputs.repo }} at ${{ steps.hub.outputs.sha }}.
