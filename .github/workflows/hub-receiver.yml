name: Hub sync receiver

on:
  repository_dispatch:
    types:
      - ambient_hub_sync

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve hub coordinates
        id: hub
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          PAYLOAD_REPO=$(echo "$CLIENT_PAYLOAD" | jq -r '
            if (.data | type) == "object" then .data.source_repo
            elif .source_repo != null then .source_repo
            elif .sourceRepo != null then .sourceRepo
            else empty end')
          PAYLOAD_SHA=$(echo "$CLIENT_PAYLOAD" | jq -r '
            if (.data | type) == "object" then .data.sha
            elif .sha != null then .sha
            elif .sourceSha != null then .sourceSha
            else empty end')
          if [ -z "$PAYLOAD_REPO" ] || [ -z "$PAYLOAD_SHA" ]; then
            echo "error: could not resolve source_repo and sha from client_payload" >&2
            exit 1
          fi
          SHORT=$(printf '%.7s' "$PAYLOAD_SHA")
          echo "repo=$PAYLOAD_REPO" >> "$GITHUB_OUTPUT"
          echo "sha=$PAYLOAD_SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Fetch MAPPING.md
        env:
          HUB_TOKEN: ${{ secrets.HUB_FETCH_TOKEN }}
        run: |
          mkdir -p docs/hub
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o "docs/hub/upstream-mapping.md" \
            -H "Authorization: token $HUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            -L "https://api.github.com/repos/${{ steps.hub.outputs.repo }}/contents/MAPPING.md?ref=${{ steps.hub.outputs.sha }}")
          test "$HTTP_STATUS" -eq 200

      - name: Fetch contracts intent
        env:
          HUB_TOKEN: ${{ secrets.HUB_FETCH_TOKEN }}
        run: |
          mkdir -p docs/hub
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o "docs/hub/data-product-contracts-intent.md" \
            -H "Authorization: token $HUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            -L "https://api.github.com/repos/${{ steps.hub.outputs.repo }}/contents/company/strategy/03_data-product-contracts.md?ref=${{ steps.hub.outputs.sha }}")
          test "$HTTP_STATUS" -eq 200


      - name: Commit sync branch
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "hub-sync/${{ steps.hub.outputs.short }}"
          git add -A
          if git diff --staged --quiet; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "hub sync from ${{ steps.hub.outputs.sha }}"
          git push -u origin "hub-sync/${{ steps.hub.outputs.short }}"
          echo "empty=false" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.commit.outputs.empty == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Hub sync ${{ steps.hub.outputs.short }}`,
              head: `hub-sync/${{ steps.hub.outputs.short }}`,
              base: 'main',
              body: `Hub sync from ${{ steps.hub.outputs.repo }} at ${{ steps.hub.outputs.sha }}.`
            });
