# When Hub sync receiver fails, capture logs and launch a Cursor Cloud Agent.
# Requires repository secret CURSOR_API_KEY.

name: CI failure Cursor bridge

on:
  workflow_run:
    workflows:
      - Hub sync receiver
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  bridge:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      !startsWith(github.event.workflow_run.head_branch, 'cursor/') &&
      (
        startsWith(github.event.workflow_run.head_branch, 'hub-sync/') ||
        github.event.workflow_run.event == 'repository_dispatch'
      )
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Collect failed workflow logs
        run: |
          set -euo pipefail
          mkdir -p ci-failure-logs
          LOG_FILE="ci-failure-logs/ci-failure-${RUN_ID}.log"
          {
            echo "Workflow:   ${WORKFLOW_NAME}"
            echo "Run ID:     ${RUN_ID}"
            echo "Run URL:    ${RUN_URL}"
            echo "Branch:     ${HEAD_BRANCH}"
            echo "Commit:     ${HEAD_SHA}"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "----- FAILED STEP LOGS -----"
          } > "$LOG_FILE"
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed >> "$LOG_FILE" 2>&1 \
            || gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log >> "$LOG_FILE" 2>&1 \
            || echo "(could not retrieve logs)" >> "$LOG_FILE"
          echo "LOG_FILE=$LOG_FILE" >> "$GITHUB_ENV"

      - name: Upload failure log artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-${{ env.RUN_ID }}
          path: ci-failure-logs/
          retention-days: 30

      - name: Launch Cursor Cloud Agent
        if: env.CURSOR_API_KEY != ''
        run: |
          set -euo pipefail
          tail -c 45000 "$LOG_FILE" > ci-failure-logs/log_tail.txt
          jq -n \
            --arg wf "$WORKFLOW_NAME" \
            --arg br "$HEAD_BRANCH" \
            --arg sha "$HEAD_SHA" \
            --arg runurl "$RUN_URL" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}" \
            --rawfile logtail ci-failure-logs/log_tail.txt \
            '{
               prompt: {
                 text: (
                   "Hub sync receiver workflow \"" + $wf + "\" failed.\n" +
                   "Branch: " + $br + " commit " + $sha + "\n" +
                   "Run: " + $runurl + "\n\n" +
                   "Fix .github/workflows/hub-receiver.yml fetch paths, hub-sync files, or markdown. " +
                   "Open a PR with the fix. Log tail:\n\n" + $logtail
                 )
               },
               repos: [{ url: $url, startingRef: $br }],
               autoCreatePR: true
             }' > cursor-agent-payload.json
          HTTP_CODE="$(curl -sS -o cursor-agent-response.json -w '%{http_code}' \
            --request POST \
            --url https://api.cursor.com/v1/agents \
            --header "Authorization: Bearer ${CURSOR_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @cursor-agent-payload.json)"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Cursor agent launch failed HTTP ${HTTP_CODE}"
            cat cursor-agent-response.json || true
            exit 1
          fi

      - name: Note when CURSOR_API_KEY is missing
        if: env.CURSOR_API_KEY == ''
        run: echo "Log captured; set CURSOR_API_KEY to enable agent launch." >> "$GITHUB_STEP_SUMMARY"
