templates:
  current-ratio:
    datasource:
    - Financial statements
    - Trial balance
    - Balance sheet
    description: 'Short-term liquidity: ability to cover current liabilities with
      current assets.'
    industryTags:
    - Corporate Finance
    - Financial Services
    - All
    methodology: Current Ratio = Current Assets / Current Liabilities
    name: Current Ratio
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 2
    targetRangeLow: 1.2
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 20
    validationRule: ratio
    benchmarkKey: current_ratio
    fpaWorkflow: Liquidity & solvency review â€” feeds covenant monitoring and the
      monthly board liquidity pack.
  quick-ratio:
    datasource:
    - Financial statements
    - Trial balance
    - Balance sheet
    description: Acid-test liquidity excluding inventory â€” most conservative short-term
      solvency view.
    industryTags:
    - Corporate Finance
    - All
    methodology: Quick Ratio = (Current Assets âˆ’ Inventory) / Current Liabilities
    name: Quick Ratio (Acid Test)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1.5
    targetRangeLow: 1
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 20
    validationRule: ratio
    benchmarkKey: quick_ratio
    fpaWorkflow: Liquidity stress testing â€” pairs with cash-flow forecasting for
      downside scenarios.
  gross-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Share of revenue retained after the direct cost of goods sold.
    industryTags:
    - Corporate Finance
    - SaaS
    - All
    methodology: Gross Margin = ((Revenue âˆ’ COGS) / Revenue) Ã— 100
    name: Gross Profit Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 70
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_margin
    fpaWorkflow: Unit-economics and pricing review â€” anchors contribution-margin
      and budget-vs-actual analysis.
  operating-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Operating profitability after operating expenses (EBIT margin).
    industryTags:
    - Corporate Finance
    - All
    methodology: Operating Margin = (Operating Income / Revenue) Ã— 100
    name: Operating Margin (EBIT)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 25
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: operating_margin
    fpaWorkflow: Opex efficiency review â€” drives the monthly variance bridge and
      cost-control actions.
  ebitda-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Core operating cash profitability before interest, tax, depreciation
      and amortization.
    industryTags:
    - Corporate Finance
    - Financial Services
    - All
    methodology: EBITDA Margin = (EBITDA / Revenue) Ã— 100
    name: EBITDA Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 30
    targetRangeLow: 15
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: ebitda_margin
    fpaWorkflow: Valuation & lender reporting â€” primary profitability proxy in models
      and covenant tests.
  net-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Bottom-line profitability after all costs, interest and tax.
    industryTags:
    - Corporate Finance
    - All
    methodology: Net Profit Margin = (Net Income / Revenue) Ã— 100
    name: Net Profit Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 20
    targetRangeLow: 8
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: net_margin
    fpaWorkflow: Board P&L reporting â€” the headline profitability line for the monthly
      close pack.
  revenue-growth:
    datasource:
    - Financial statements
    - General ledger
    description: Period-over-period revenue growth rate.
    industryTags:
    - Corporate Finance
    - SaaS
    - All
    methodology: Revenue Growth = ((Current Period Revenue âˆ’ Prior Period Revenue)
      / Prior Period Revenue) Ã— 100
    name: Revenue Growth Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 30
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 1000
    validationRule: percentage_unbounded
    benchmarkKey: revenue_growth
    fpaWorkflow: Growth planning â€” drives top-line forecast, hiring plan and the
      rolling re-forecast.
  working-capital:
    datasource:
    - Financial statements
    - Balance sheet
    - Trial balance
    description: Operating liquidity available to fund day-to-day operations.
    industryTags:
    - Corporate Finance
    - All
    methodology: Working Capital = Current Assets âˆ’ Current Liabilities
    name: Working Capital
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1000000
    targetRangeLow: 100000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -1000000000
      hardMax: 1000000000
    validationRule: currency_signed
    benchmarkKey: working_capital
    fpaWorkflow: Working-capital management â€” feeds the 13-week cash forecast and
      treasury planning.
  dso:
    datasource:
    - Accounts receivable aging
    - Financial statements
    - General ledger
    description: Average number of days to collect cash after a sale.
    industryTags:
    - Corporate Finance
    - All
    methodology: DSO = (Accounts Receivable / Total Credit Sales) Ã— Number of Days
    name: Days Sales Outstanding (DSO)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 45
    targetRangeLow: 30
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 365
    validationRule: days
    benchmarkKey: dso
    fpaWorkflow: Receivables & collections review â€” directly improves the cash-conversion
      cycle and forecast accuracy.
  dpo:
    datasource:
    - Accounts payable aging
    - Financial statements
    - General ledger
    description: Average number of days the business takes to pay its suppliers.
    industryTags:
    - Corporate Finance
    - All
    methodology: DPO = (Accounts Payable / COGS) Ã— Number of Days
    name: Days Payable Outstanding (DPO)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 30
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 365
    validationRule: days
    benchmarkKey: dpo
    fpaWorkflow: Payables optimization â€” balances supplier terms against the cash-conversion
      cycle.
  ccc:
    datasource:
    - Accounts receivable aging
    - Accounts payable aging
    - Inventory records
    description: Days to convert investments in inventory and receivables back into
      cash.
    industryTags:
    - Corporate Finance
    - All
    methodology: CCC = DSO + Days Inventory Outstanding âˆ’ DPO
    name: Cash Conversion Cycle
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 20
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: -180
      hardMax: 365
    validationRule: days_signed
    benchmarkKey: ccc
    fpaWorkflow: Cash-efficiency program â€” a north-star working-capital KPI tracked
      in the treasury review.
  operating-cash-flow:
    datasource:
    - Financial statements
    - Bank statements
    - General ledger
    description: Cash generated by core operations during the period.
    industryTags:
    - Corporate Finance
    - All
    methodology: Operating Cash Flow = Net Income + Non-Cash Charges âˆ’ Increase
      in Working Capital
    name: Operating Cash Flow
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1000000
    targetRangeLow: 200000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -1000000000
      hardMax: 1000000000
    validationRule: currency_signed
    benchmarkKey: operating_cash_flow
    fpaWorkflow: Cash-flow forecasting â€” the anchor of the direct/indirect cash-flow
      statement.
  burn-rate:
    datasource:
    - Bank statements
    - Financial statements
    - General ledger
    description: Net cash consumed per month (negative net operating cash flow).
    industryTags:
    - SaaS
    - Corporate Finance
    - All
    methodology: Net Burn = Cash Out âˆ’ Cash In (per month)
    name: Monthly Burn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 200000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: burn_rate
    fpaWorkflow: Runway management â€” paired with cash balance to govern the spend
      plan and fundraising timing.
  runway:
    datasource:
    - Bank statements
    - Financial statements
    description: Number of months of cash remaining at the current net burn rate.
    industryTags:
    - SaaS
    - Corporate Finance
    - All
    methodology: Runway (months) = Current Cash Balance / Monthly Net Burn
    name: Cash Runway
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 24
    targetRangeLow: 12
    tech: FINTECH
    type: Financial
    unit: Months
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 240
    validationRule: number
    benchmarkKey: runway
    fpaWorkflow: Board & investor reporting â€” the survival metric that gates hiring
      and spend decisions.
