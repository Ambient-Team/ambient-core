    - Revenue_Streams
    - Operating_Expenses
    - Asset_Values
    - Liability_Amounts
    fields: []
    metricRefs:
      default:
      - Gross Profit Margin
      - Operating Margin (EBIT)
      - Net Profit Margin
      Vertical Farming:
      - Cost per Kilogram of Produce
      - Profit Margin
      - Gross Profit Margin
    fieldCoverage: upload
