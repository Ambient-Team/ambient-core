dataOptionTemplates:
  financial_statements:
    keySuffix: GvoI0Vg2YijGfgoBaqqe
    name: Financial statements
    description: Records of a company's financial activities (income, expenses, assets, liabilities).
    format: Document
    template: Financial Statement Template
    lastUpdated: '2024-07-31 14:25:05'
    dummyFields:
    - Date
    - Revenue_Streams
    - Operating_Expenses
    - Asset_Values
    - Liability_Amounts
    fields:
    - name: date
      type: date
    - name: statement_type
      type: enum
    - name: period_start_date
      type: date
    - name: period_end_date
      type: date
    metricRefs:
      default:
      - Current Ratio
      - Quick Ratio (Acid Test)
      - Gross Profit Margin
      - Operating Margin (EBIT)
      - Net Profit Margin
      - EBITDA Margin
      - Operating Cash Flow
      - Revenue Growth Rate
      - Working Capital
      - Days Sales Outstanding (DSO)
      - Days Payable Outstanding (DPO)
      - Cash Conversion Cycle
      - Monthly Burn Rate
      - Cash Runway
      Real Estate:
      - Return on Investment (ROI)
      - Net Operating Income (NOI)
      - Capitalization Rate (Cap Rate)
      - Cash Flow
      - Cash-on-Cash Return
      - Debt Service Coverage Ratio (DSCR)
    fieldCoverage: upload
    collectionFrequency: monthly
    grain: month
  hr_records:
    keySuffix: 5aMhHPzshRFSHX4PjOMH
    name: HR records
    description: Records related to human resources and employee data.
    format: Document
    template: Document
    lastUpdated: '2024-07-31 14:25:07'
    dummyFields:
    - Date
    - Revenue_Streams
    - Operating_Expenses
    - Asset_Values
    - Liability_Amounts
    fields:
    - name: date
      type: date
    - name: headcount
      type: decimal
    metricRefs:
      default:
      - Headcount (FTE)
      Transportation:
      - Driver Turnover Rate
      Vertical Farming:
      - Labor Cost per Kilogram of Produce
      Healthcare:
      - Staffing Ratio
      Restaurants:
      - Labor Cost Percentage
