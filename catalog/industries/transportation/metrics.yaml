metrics:
  DtBqsvp9S9HBlcxsvAgd:
    datasource:
    - HR records
    - Payroll records
    - Exit interviews
    description: The percentage of drivers that leave the company within a specific
      period.
    id: 14
    industry: Transportation
    methodology: (Number of drivers who left / Total number of drivers) * 100
    name: Driver Turnover Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 100
    targetRangeLow: 20
    tech: DEEP TECH
    type: Operational
    unit: '%'
    segment: road_freight
    slug: driver_turnover
    calc:
      expr: drivers_left / total_drivers * 100
      inputs:
      - drivers_left
      - total_drivers
  SAZkxRxYFtf1EIxBXWMk:
    datasource:
    - Fuel logs
    - GPS tracking data
    - Vehicle telematics data
    description: Average miles per gallon for the fleet.
    id: 10
    industry: Transportation
    methodology: Total miles driven / Total fuel used
    name: Fuel Efficiency
    sensorFieldData:
    - Fuel logs
    - GPS tracking data
    status: data needed
    targetRangeHigh: 50
    targetRangeLow: 5
    tech: DEEP TECH
    type: Operational
    unit: Miles per Gallon (MPG)
    segment: road_freight
    slug: fuel_efficiency
    calc:
      expr: total_miles / total_fuel
      inputs:
      - total_miles
      - total_fuel
  biA3oIK816fwfInBKg2e:
    datasource:
    - Delivery logs
    - GPS tracking data
    - Customer confirmations
    description: The percentage of deliveries made on or before the scheduled delivery
      time.
    id: 12
    industry: Transportation
    methodology: (Number of on-time deliveries / Total deliveries) * 100
    name: On-Time Delivery Rate
    sensorFieldData:
    - GPS tracking data
    - Delivery confirmations
    status: data needed
    targetRangeHigh: 99
    targetRangeLow: 85
    tech: DEEP TECH
    type: Operational
    unit: '%'
    segment: road_freight
    slug: on_time_delivery_rate
    calc:
      expr: on_time_deliveries / total_deliveries * 100
      inputs:
      - on_time_deliveries
      - total_deliveries
  iIaKhCCf0BGvHX1W1i7n:
    datasource:
    - Fleet management systems
    - GPS tracking data
    - Usage logs
    description: The percentage of time the fleet is actively in use.
    id: 11
    industry: Transportation
    methodology: (Total time fleet in use / Total available fleet time) * 100
    name: Fleet Utilization Rate
    sensorFieldData:
    - GPS tracking data
    - Usage logs
    status: data needed
    targetRangeHigh: 80
    targetRangeLow: 20
    tech: DEEP TECH
    type: Operational
    unit: Percentage
    segment: road_freight
    slug: fleet_utilization
    calc:
      expr: fleet_time_in_use / fleet_available_time * 100
      inputs:
      - fleet_time_in_use
      - fleet_available_time
  vXlB5QC3mZJw1auWaIfK:
    datasource:
    - Maintenance logs
    - GPS tracking data
    - Accounting Software
    description: Total maintenance costs divided by total miles driven.
    id: 13
    industry: Transportation
    methodology: Total maintenance costs / Total miles driven
    name: Maintenance Cost per Mile
    sensorFieldData:
    - Maintenance logs
    - GPS tracking data
    status: data needed
    targetRangeHigh: 0.1
    targetRangeLow: 0.02
    tech: DEEP TECH
    type: Operational
    unit: USD/mile
    segment: road_freight
    slug: maintenance_cost_per_mile
    calc:
      expr: total_maintenance_costs / total_miles
      inputs:
      - total_maintenance_costs
      - total_miles
  Alltransportationsaas-mrr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Normalized recurring subscription revenue billed in a month.
    id: 1012
    industry: Transportation
    industryTags:
    - SaaS
    methodology: MRR = Σ (Active Subscriptions × Monthly Subscription Price)
    name: Monthly Recurring Revenue (MRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 500000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 1000000000
    validationRule: currency
    benchmarkKey: mrr
    fpaWorkflow: Recurring-revenue forecast — the foundation of the SaaS operating
      model and ARR bridge.
    segment: subscription
    slug: mrr
    calc:
      expr: active_subscriptions * avg_monthly_price
      inputs:
      - active_subscriptions
      - avg_monthly_price
  Alltransportationsaas-arr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Annualized run-rate of recurring subscription revenue.
    id: 1018
    industry: Transportation
    industryTags:
    - SaaS
    methodology: ARR = MRR × 12
    name: Annual Recurring Revenue (ARR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 6000000
    targetRangeLow: 600000
    tech: FINTECH
    type: Financial
    unit: Currency/year
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 10000000000
    validationRule: currency
    benchmarkKey: arr
    fpaWorkflow: Annual planning & valuation — the headline scale metric for SaaS
      boards and investors.
    segment: subscription
    slug: arr
    calc:
      expr: mrr * 12
      inputs: []
  Alltransportationsaas-nrr:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Revenue retained and expanded from existing customers, net of churn
      and contraction.
    id: 1024
    industry: Transportation
    industryTags:
    - SaaS
    methodology: NRR = ((Starting MRR + Expansion − Contraction − Churn) / Starting
      MRR) × 100
    name: Net Revenue Retention (NRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 120
    targetRangeLow: 100
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 300
    validationRule: percentage_unbounded
    benchmarkKey: nrr
    fpaWorkflow: Expansion & retention modeling — the strongest signal of durable
      SaaS growth quality.
    segment: subscription
    slug: nrr
    calc:
      expr: (starting_mrr + expansion_mrr - contraction_mrr - churned_mrr) / starting_mrr
        * 100
      inputs:
      - starting_mrr
      - expansion_mrr
      - contraction_mrr
      - churned_mrr
  Alltransportationsaas-gross-churn:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Percentage of recurring revenue lost to cancellations and downgrades.
    id: 1030
    industry: Transportation
    industryTags:
    - SaaS
    methodology: Gross Churn = (Churned MRR / Starting MRR) × 100
    name: Gross Revenue Churn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 1
    tech: FINTECH
    type: Operational
    unit: '%'
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_churn
    fpaWorkflow: Retention review — informs the renewal forecast and customer-success
      investment case.
    segment: subscription
    slug: gross_churn
    calc:
      expr: churned_mrr / starting_mrr * 100
      inputs:
      - churned_mrr
      - starting_mrr
  Alltransportationsaas-cac:
    datasource:
    - Marketing spend records
    - CRM / Sales pipeline
    - General ledger
    description: Fully-loaded sales & marketing cost to acquire one new customer.
    id: 1036
    industry: Transportation
    industryTags:
    - SaaS
    methodology: CAC = Total Sales & Marketing Spend / New Customers Acquired
    name: Customer Acquisition Cost (CAC)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10000
    targetRangeLow: 500
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 10000000
    validationRule: currency
    benchmarkKey: cac
    fpaWorkflow: Go-to-market efficiency — feeds CAC payback and the marketing budget
      allocation.
    segment: subscription
    slug: cac
    calc:
      expr: sales_marketing_spend / new_customers
      inputs:
      - sales_marketing_spend
      - new_customers
  Alltransportationsaas-ltv:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Expected gross-margin revenue from a customer over their lifetime.
    id: 1042
    industry: Transportation
    industryTags:
    - SaaS
    methodology: LTV = (Average Revenue per Account × Gross Margin %) / Churn Rate
    name: Customer Lifetime Value (LTV)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 50000
    targetRangeLow: 3000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: ltv
    fpaWorkflow: Unit-economics modeling — combined with CAC to gate growth-spend
      decisions.
    segment: subscription
    slug: ltv
    calc:
      expr: (avg_revenue_per_account * gross_margin_pct / 100) / churn_rate
      inputs:
      - avg_revenue_per_account
      - gross_margin_pct
      - churn_rate
  Alltransportationsaas-ltv-cac:
    datasource:
    - Subscription billing records
    - Marketing spend records
    description: Ratio of customer lifetime value to acquisition cost — core SaaS
      unit economics.
    id: 1048
    industry: Transportation
    industryTags:
    - SaaS
    methodology: LTV:CAC = Customer Lifetime Value / Customer Acquisition Cost
    name: 'LTV : CAC Ratio'
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 3
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: ratio
    benchmarkKey: ltv_cac
    fpaWorkflow: Investment efficiency — a board-level guardrail (target ≥ 3:1) for
      scaling spend.
    segment: subscription
    slug: ltv_cac
    calc:
      expr: ltv / cac
      inputs: []
  Alltransportationsaas-rule-of-40:
    datasource:
    - Subscription billing records
    - Financial statements
    description: Balance of growth and profitability for recurring-revenue businesses.
    id: 1054
    industry: Transportation
    industryTags:
    - SaaS
    methodology: Rule of 40 = Revenue Growth % + Profit Margin %
    name: Rule of 40
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 200
    validationRule: percentage_unbounded
    benchmarkKey: rule_of_40
    fpaWorkflow: Growth-vs-profitability review — a single composite health score
      for SaaS planning.
    segment: subscription
    slug: rule_of_40
    calc:
      expr: revenue_growth_pct + profit_margin_pct
      inputs:
      - revenue_growth_pct
      - profit_margin_pct
  transportation.rail_freight.train_utilization:
    id: 1860
    name: Train Utilization
    description: Loaded train-miles or tonnage moved relative to available train capacity
      (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: Train Utilization = (Loaded Train-Miles / Available Train-Miles)
      × 100
    datasource:
    - Rail freight operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Rail asset use — distinct from road fleet utilization.
    segment: rail_freight
    slug: train_utilization
    calc:
      expr: loaded_train_miles / available_train_miles * 100
      inputs:
      - loaded_train_miles
      - available_train_miles
  transportation.rail_freight.cost_per_ton_mile:
    id: 1861
    name: Cost per Ton-Mile
    description: Total rail freight operating cost per ton-mile moved (aggregated).
    industry: Transportation
    type: Financial
    unit: USD per ton-mile
    methodology: Cost per Ton-Mile = Total Operating Cost / Ton-Miles Moved
    datasource:
    - Rail freight operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: quarterly
    tech: FINTECH
    higherIsBetter: false
    fpaWorkflow: Unit economics — pricing versus truck and barge competition.
    segment: rail_freight
    slug: cost_per_ton_mile
    calc:
      expr: total_operating_cost / ton_miles_moved
      inputs:
      - total_operating_cost
      - ton_miles_moved
  transportation.rail_freight.on_time_train_performance:
    id: 1862
    name: On-Time Train Performance
    description: Share of rail shipments arriving within contractual or service window
      (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: OTP = (On-Time Shipments / Total Shipments) × 100
    datasource:
    - Rail freight operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Service reliability — rail-specific definition.
    segment: rail_freight
    slug: on_time_train_performance
    calc:
      expr: on_time_shipments / total_shipments * 100
      inputs:
      - on_time_shipments
      - total_shipments
  transportation.rail_passenger.ridership_per_train_mile:
    id: 1863
    name: Ridership per Train-Mile
    description: Passenger boardings per train-mile operated (aggregated).
    industry: Transportation
    type: Operational
    unit: Passengers per train-mile
    methodology: Ridership per Train-Mile = Total Boardings / Train-Miles Operated
    datasource:
    - Rail passenger operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    fpaWorkflow: Passenger rail productivity — load and schedule design.
    segment: rail_passenger
    slug: ridership_per_train_mile
    calc:
      expr: total_boardings / train_miles_operated
      inputs:
      - total_boardings
      - train_miles_operated
  transportation.rail_passenger.farebox_recovery:
    id: 1864
    name: Rail Farebox Recovery Ratio
    description: Passenger fare revenue as a share of fully allocated operating cost
      (aggregated).
    industry: Transportation
    type: Financial
    unit: '%'
    methodology: Farebox Recovery = (Fare Revenue / Operating Cost) × 100
    datasource:
    - Rail passenger operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: annual
    tech: FINTECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 200
    fpaWorkflow: Subsidy dependence — intercity and commuter rail.
    segment: rail_passenger
    slug: farebox_recovery
    calc:
      expr: fare_revenue / operating_cost * 100
      inputs:
      - fare_revenue
      - operating_cost
  transportation.maritime_shipping.vessel_utilization:
    id: 1865
    name: Vessel Utilization
    description: Operating days at sea or laden days relative to available vessel
      days (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: Vessel Utilization = (Operating Days / Available Days) × 100
    datasource:
    - Maritime fleet operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Fleet employment — dry dock and positioning time.
    segment: maritime_shipping
    slug: vessel_utilization
    calc:
      expr: operating_days / available_days * 100
      inputs:
      - operating_days
      - available_days
  transportation.maritime_shipping.time_charter_equivalent:
    id: 1866
    name: Time Charter Equivalent (TCE)
    description: Daily revenue net of voyage costs per day chartered (aggregated).
    industry: Transportation
    type: Financial
    unit: Currency per day
    methodology: TCE = (Voyage Revenue − Voyage Costs) / On-Hire Days
    datasource:
    - Maritime fleet operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: quarterly
    tech: FINTECH
    higherIsBetter: true
    fpaWorkflow: Shipping yield — bunker and route economics.
    segment: maritime_shipping
    slug: time_charter_equivalent
    calc:
      expr: (voyage_revenue - voyage_costs) / on_hire_days
      inputs:
      - voyage_revenue
      - voyage_costs
      - on_hire_days
  transportation.maritime_shipping.schedule_reliability:
    id: 1867
    name: Schedule Reliability
    description: Share of port calls or voyages completed within published schedule
      window (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: Reliability = (On-Schedule Voyages / Total Voyages) × 100
    datasource:
    - Maritime fleet operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Liner service quality — customer SLAs.
    segment: maritime_shipping
    slug: schedule_reliability
    calc:
      expr: on_schedule_voyages / total_voyages * 100
      inputs:
      - on_schedule_voyages
      - total_voyages
  transportation.public_transit.farebox_recovery_ratio:
    id: 1868
    name: Transit Farebox Recovery Ratio
    description: Fare and subsidy-eligible revenue as a share of operating expenses
      (aggregated).
    industry: Transportation
    type: Financial
    unit: '%'
    methodology: Farebox Recovery = (Operating Revenue / Operating Expenses) × 100
    datasource:
    - Public transit operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: annual
    tech: FINTECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 200
    fpaWorkflow: Municipal funding gap — bus and rail transit.
    segment: public_transit
    slug: farebox_recovery_ratio
    calc:
      expr: operating_revenue / operating_expenses * 100
      inputs:
      - operating_revenue
      - operating_expenses
  transportation.public_transit.ridership_per_vehicle_hour:
    id: 1869
    name: Ridership per Vehicle Hour
    description: Unlinked passenger trips per vehicle revenue hour (aggregated).
    industry: Transportation
    type: Operational
    unit: Passengers per vehicle hour
    methodology: Ridership per Vehicle Hour = Unlinked Trips / Vehicle Revenue Hours
    datasource:
    - Public transit operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    fpaWorkflow: Service productivity — headway and crowding tradeoffs.
    segment: public_transit
    slug: ridership_per_vehicle_hour
    calc:
      expr: unlinked_trips / vehicle_revenue_hours
      inputs:
      - unlinked_trips
      - vehicle_revenue_hours
  transportation.public_transit.on_time_performance:
    id: 1870
    name: On-Time Performance
    description: Share of transit trips departing or arriving within agency on-time
      standard (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: OTP = (On-Time Trips / Total Trips) × 100
    datasource:
    - Public transit operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Service quality — distinct from aviation OTP thresholds.
    segment: public_transit
    slug: on_time_performance
    calc:
      expr: on_time_trips / total_trips * 100
      inputs:
      - on_time_trips
      - total_trips
  transportation.freight_forwarding.gross_margin_per_shipment:
    id: 1871
    name: Gross Margin per Shipment
    description: Average gross profit per shipment handled by the forwarder (aggregated).
    industry: Transportation
    type: Financial
    unit: Currency
    methodology: Margin per Shipment = Gross Profit / Shipments Handled
    datasource:
    - Freight forwarding operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: FINTECH
    higherIsBetter: true
    fpaWorkflow: 3PL unit economics — buy versus sell rate spread.
    segment: freight_forwarding
    slug: gross_margin_per_shipment
    calc:
      expr: gross_profit / shipments_handled
      inputs:
      - gross_profit
      - shipments_handled
  transportation.freight_forwarding.on_time_delivery_shipper:
    id: 1872
    name: On-Time Delivery (Shipper SLA)
    description: Share of forwarder-managed shipments delivered within customer SLA
      (aggregated).
    industry: Transportation
    type: Operational
    unit: '%'
    methodology: OTD = (On-Time Shipments / Total Shipments) × 100
    datasource:
    - Freight forwarding operations summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Shipper-facing reliability — distinct from owned-fleet road OTD.
    segment: freight_forwarding
    slug: on_time_delivery_shipper
    calc:
      expr: on_time_shipments / total_shipments * 100
      inputs:
      - on_time_shipments
      - total_shipments
