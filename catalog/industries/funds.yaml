    industry: Funds
    segment: fund
    format: Document
    template: Financial Statement Template
    fields:
    - date
    - fund_vehicle_id
    - book_type
    - assets_under_management
    - inflows
    - outflows
    - beginning_aum
    - management_fees
    - average_aum
    - custody_fees
    - average_auc
    - failed_settlements
    - total_settlement_instructions
    metricIds:
    - 1900
    - 1901
    - 1902
    - 1911
    - 1912
    - 1913
    - 1914
    lastUpdated: '2026-06-25 00:00:00'
  funds.fund.fund_performance_summary:
    id: 1917
    name: Aggregated fund performance summary
