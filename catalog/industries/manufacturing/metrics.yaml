metrics:
  MfgOee901CatalogMetricKey01:
    id: 901
    name: Overall Equipment Effectiveness (OEE)
    description: Composite utilization of manufacturing equipment (availability ×
      performance × quality).
    industry: Manufacturing
    type: Operational
    unit: '%'
    methodology: OEE = Availability × Performance × Quality (each as % of ideal)
    datasource:
    - MES production export
    - Machine run-time counters
    sensorFieldData:
    - Machine state sensors
    - Cycle time counters
    status: data needed
    targetRangeLow: 60
    targetRangeHigh: 85
    tech: DEEP TECH
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    benchmarkKey: oee
    frequency: weekly
    higherIsBetter: true
    fpaWorkflow: Capacity planning — ties shop-floor efficiency to unit economics
      and capex cases.
    segment: operations
    slug: oee
    calc:
      expr: availability * performance * quality
      inputs:
      - availability
      - performance
      - quality
  MfgScrap902CatalogMetricKey02:
    id: 902
    name: Scrap Rate
    description: Share of production output rejected or reworked due to quality defects.
    industry: Manufacturing
    type: Operational
    unit: '%'
    methodology: Scrap Rate = (Scrapped Units / Total Units Produced) × 100
    datasource:
    - Quality inspection logs
    - MES production export
    sensorFieldData:
    - Inline quality sensors
    status: data needed
    targetRangeLow: 1
    targetRangeHigh: 5
    tech: DEEP TECH
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    frequency: weekly
    higherIsBetter: false
    fpaWorkflow: Margin protection — scrap drives COGS variance and customer chargebacks.
    segment: operations
    slug: scrap_rate
    calc:
      expr: scrapped_units / total_units * 100
      inputs:
      - scrapped_units
      - total_units
  MfgInvTurn903CatalogMetricKey03:
    id: 903
    name: Inventory Turnover
    description: How often inventory is sold or consumed and replaced over a period.
    industry: Manufacturing
    type: Financial
    unit: Turns
    methodology: Inventory Turnover = COGS / Average Inventory Value
    datasource:
    - ERP general ledger
    - Inventory valuation export
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 4
    targetRangeHigh: 12
    tech: FINTECH
    benchmarkKey: inventory_turnover
    frequency: monthly
    higherIsBetter: true
    fpaWorkflow: Working-capital review — links ops throughput to cash tied in stock.
    segment: financial
    slug: inventory_turnover
    calc:
      expr: cogs / average_inventory
      inputs:
      - cogs
      - average_inventory
  MfgDownt904CatalogMetricKey04:
    id: 904
    name: Unplanned Downtime
    description: Hours or minutes of production stoppage not scheduled for maintenance.
    industry: Manufacturing
    type: Operational
    unit: Minutes
    methodology: Sum of unplanned stop events from CMMS or MES downtime codes
    datasource:
    - CMMS maintenance logs
    - MES downtime events
    sensorFieldData:
    - Machine fault codes
    status: data needed
    targetRangeLow: 30
    targetRangeHigh: 240
    tech: DEEP TECH
    frequency: weekly
    higherIsBetter: false
    fpaWorkflow: Ops-to-finance bridge — downtime explains revenue and labor efficiency
      gaps.
    segment: operations
    slug: unplanned_downtime
    input: true
  MfgUnitCogs905CatalogMetricKey05:
    id: 905
    name: Unit Cost of Goods Sold
    description: Fully loaded cost to produce one unit of finished goods.
    industry: Manufacturing
    type: Financial
    unit: Currency (e.g., USD)
    methodology: Unit COGS = Total Manufacturing COGS / Units Produced
    datasource:
    - ERP general ledger
    - MES production export
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 10
    targetRangeHigh: 500
    tech: FINTECH
    validationRule: currency
    frequency: monthly
    higherIsBetter: false
    fpaWorkflow: Pricing and margin — baseline for make-vs-buy and contract manufacturing
      bids.
    segment: financial
    slug: unit_cogs
    calc:
      expr: total_manufacturing_cogs / units_produced
      inputs:
      - total_manufacturing_cogs
      - units_produced
  Allmanufacturingmfg-capacity-utilization:
    datasource:
    - Production output logs
    description: Share of available production capacity actually used.
    id: 1073
    industry: Manufacturing
    industryTags:
    - Manufacturing
    methodology: Capacity Utilization = (Actual Output / Maximum Possible Output)
      × 100
    name: Capacity Utilization
    sensorFieldData:
    - Machine run-time counters
    status: data needed
    targetRangeHigh: 90
    targetRangeLow: 70
    tech: DEEP TECH
    type: Operational
    unit: '%'
    frequency: weekly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: percentage
    benchmarkKey: capacity_utilization
    fpaWorkflow: Capacity & capex planning — informs make-vs-buy and expansion investment
      cases.
    segment: operations
    slug: capacity_utilization
    calc:
      expr: actual_output / max_output * 100
      inputs:
      - actual_output
      - max_output
