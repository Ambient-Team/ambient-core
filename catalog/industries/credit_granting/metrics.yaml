metrics:
  credit_granting.consumer_lending.portfolio_yield:
    id: 1720
    name: Portfolio Yield
    description: Interest income on consumer receivables relative to average outstanding
      balance (aggregated).
    industry: Credit Granting
    type: Financial
    unit: '%'
    methodology: Portfolio Yield = (Interest Income / Average Receivables) × 100
    datasource:
    - Aggregated consumer loan tape summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: FINTECH
    higherIsBetter: true
    fpaWorkflow: Revenue driver — spread on consumer book vs funding cost.
    segment: consumer_lending
    slug: portfolio_yield
    calc:
      expr: interest_income / average_receivables * 100
      inputs:
      - interest_income
      - average_receivables
  credit_granting.consumer_lending.net_charge_off_rate:
    id: 1721
    name: Net Charge-Off Rate
    description: Charge-offs net of recoveries as a share of average receivables.
    industry: Credit Granting
    type: Financial
    unit: '%'
    methodology: NCO Rate = (Net Charge-Offs / Average Receivables) × 100
    datasource:
    - Aggregated consumer loan tape summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: quarterly
    tech: FINTECH
    higherIsBetter: false
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Credit loss — macro and underwriting quality signal.
    segment: consumer_lending
    slug: net_charge_off_rate
    calc:
      expr: net_charge_offs / average_receivables * 100
      inputs:
      - net_charge_offs
      - average_receivables
  credit_granting.consumer_lending.delinquency_rate_30d:
    id: 1722
    name: 30+ Day Delinquency Rate
    description: Share of receivables past due 30 days or more (aggregated).
    industry: Credit Granting
    type: Financial
    unit: '%'
    methodology: Delinquency Rate = (Delinquent Balance 30+ / Total Receivables) ×
      100
    datasource:
    - Aggregated consumer loan tape summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: FINTECH
    higherIsBetter: false
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    fpaWorkflow: Early warning — rolls into charge-offs and provisions.
    segment: consumer_lending
    slug: delinquency_rate_30d
    calc:
      expr: delinquent_balance_30_plus / total_receivables * 100
      inputs:
      - delinquent_balance_30_plus
      - total_receivables
  credit_granting.consumer_lending.origination_volume_growth:
