    description: Period COGS, average inventory, and shrink adjustments (aggregated).
    industry: Retail
    segment: financial
    format: Document
    template: Financial Statement Template
    fields:
    - date
    - banner
    - cogs
    - average_inventory_value
    - shrinkage_value
    - sales
    metricIds:
    - 1671
