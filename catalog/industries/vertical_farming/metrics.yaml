metrics:
  0MJiYgAPcgkzE3xEgOFE:
    datasource:
    - Farm Management Systems
    - Maintenance logs
    description: Cost savings achieved by preventing equipment failures through predictive
      maintenance.
    id: 23
    industry: Vertical Farming
    methodology: Potential Repair Cost Avoided - Predictive Maintenance Cost
    name: Predictive Maintenance Cost Savings
    sensorFieldData:
    - Vibration sensors
    - Power consumption sensors (depending on equipment)
    status: data needed
    targetRangeHigh: 10000
    targetRangeLow: 1000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    segment: financial
    slug: predictive_maintenance_savings
    calc:
      expr: repair_cost_avoided - predictive_maintenance_cost
      inputs:
      - repair_cost_avoided
      - predictive_maintenance_cost
  6IfrKxlTi9pbGzpuLL5u:
    datasource:
    - Farm Management Systems
    - Accounting Software
    description: Total cost associated with producing one kilogram of crops.
    id: 20
    industry: Vertical Farming
    methodology: Total Production Cost (Seeds, Fertilizers, Nutrients) + Total Operational
      Cost (Labor, Energy, Water, Maintenance) / Total Yield (kg)
    name: Cost per Kilogram of Produce
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10
    targetRangeLow: 2
    tech: DEEP TECH
    type: Operational
    unit: $/kg
    segment: operations
    slug: total_cost
    calc:
      expr: total_production_cost + total_operational_cost
      inputs:
      - total_production_cost
      - total_operational_cost
  8B9bFHS6GSsjzHx9ppKu:
    datasource:
    - Energy Bills
    - Farm Management Systems
    description: Energy consumption required to deliver the desired light intensity.
    id: 22
    industry: Vertical Farming
    methodology: Energy Consumed (kWh) / Total Light Delivered (lux-hours or similar
      unit)
    name: Energy Cost per Unit of Light Delivered
    sensorFieldData:
    - Light intensity sensors (lux meters)
    status: data needed
    targetRangeHigh: 0.5
    targetRangeLow: 0.1
    tech: DEEP TECH
    type: Operational
    unit: kWh/lux-hour
    fpaWorkflow: Opex efficiency review — energy spikes explain variance before close.
    operationalSignal: Field telemetry — light and power sensors
    financialImpact: Opex and margin — flows to NOI and covenant headroom
    segment: operations
    slug: energy_light_efficiency
    calc:
      expr: energy_consumed / total_light_delivered
      inputs:
      - energy_consumed
      - total_light_delivered
  E5khIDv93onvwtXBUsJH:
    datasource:
    - Crop monitoring systems
    - Farm management systems
    description: An index indicating the overall health of crops based on various
      parameters.
    id: 19
    industry: Vertical Farming
    methodology: Crop Health Index = (Sum of Health Scores / Total Number of Crops)
      * 100
    name: Crop Health Index
    sensorFieldData:
    - Crop monitoring systems
    - Environmental sensors
    status: data needed
    targetRangeHigh: 100
    targetRangeLow: 50
    tech: DEEP TECH
    type: Operational
    unit: Index
    segment: operations
    slug: crop_health_index
    calc:
      expr: sum_health_scores / total_crops * 100
      inputs:
      - sum_health_scores
      - total_crops
  F6IlgQNV6qNtUhk3BVtT:
    datasource:
    - Farm Management Systems
    - Accounting Software
    description: Difference between revenue and total costs.
    id: 21
    industry: Vertical Farming
    methodology: Revenue from Produce Sales - Total Production Cost - Total Operational
      Cost
    name: Profit Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 30
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: '%'
    segment: financial
    slug: vf_net_profit
    calc:
      expr: produce_revenue - total_production_cost - total_operational_cost
      inputs:
      - produce_revenue
      - total_production_cost
      - total_operational_cost
  WeTkxvZyeWX51XfBGsuR:
    datasource:
    - Payroll records
    - Harvest logs
    description: Average labor cost associated with producing one kilogram of produce.
    id: 18
    industry: Vertical Farming
    methodology: Labor Cost per Kilogram of Produce = Total Labor Costs / Total Harvested
      Produce (kg)
    name: Labor Cost per Kilogram of Produce
    sensorFieldData:
    - Payroll records
    - Harvest logs
    status: data needed
    targetRangeHigh: 2
    targetRangeLow: 0.5
    tech: DEEP TECH
    type: Operational
    unit: $/kg
    segment: operations
    slug: labor_cost_per_kg
    calc:
      expr: total_labor_costs / total_harvested_kg
      inputs:
      - total_labor_costs
      - total_harvested_kg
  f3yEk5mEWwKhAFFQFyje:
    datasource:
    - Irrigation logs
    - Farm management systems
    description: Amount of produce harvested per liter of water used.
    id: 16
    industry: Vertical Farming
    methodology: Water Usage Efficiency = Total Harvested Produce (kg) / Total Water
      Used (liters)
    name: Water Usage Efficiency
    sensorFieldData:
    - Water flow meters
    - soil moisture sensors
    status: data needed
    targetRangeHigh: 10
    targetRangeLow: 1
    tech: DEEP TECH
    type: Operational
    unit: kg/liter
    segment: operations
    slug: water_use_efficiency
    calc:
      expr: total_harvested_kg / total_water_liters
      inputs:
      - total_harvested_kg
      - total_water_liters
  jnQw1pD0motTKBZ9csPD:
    datasource:
    - Harvest logs
    - Farm management systems
    description: Amount of produce harvested per square meter of growing area.
    id: 15
    industry: Vertical Farming
    methodology: Yield per Square Meter = Total Harvested Produce (kg) / Total Growing
      Area (m²)
    name: Yield per Square Meter
    sensorFieldData:
    - Crop monitoring systems
    status: data needed
    targetRangeHigh: 20
    targetRangeLow: 5
    tech: DEEP TECH
    type: Operational
    unit: kg/m²
    segment: operations
    slug: yield_per_sqm
    calc:
      expr: total_harvested_kg / total_growing_area
      inputs:
      - total_harvested_kg
      - total_growing_area
  yGoqLDC3Mrk1OeH36jkB:
    datasource:
    - Energy bills
    - Farm management systems
    description: Amount of energy consumed per square meter of growing area.
    id: 17
    industry: Vertical Farming
    methodology: Energy Consumption per Square Meter = Total Energy Consumed (kWh)
      / Total Growing Area (m²)
    name: Energy Consumption per Square Meter
    sensorFieldData:
    - Energy meters
    status: data needed
    targetRangeHigh: 200
    targetRangeLow: 50
    tech: DEEP TECH
    type: Operational
    unit: kWh/m²
    segment: operations
    slug: energy_per_sqm
    calc:
      expr: total_energy_kwh / total_growing_area
      inputs:
      - total_energy_kwh
      - total_growing_area
  Allverticalfarmingsaas-mrr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Normalized recurring subscription revenue billed in a month.
    id: 1011
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: MRR = Σ (Active Subscriptions × Monthly Subscription Price)
    name: Monthly Recurring Revenue (MRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 500000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 1000000000
    validationRule: currency
    benchmarkKey: mrr
    fpaWorkflow: Recurring-revenue forecast — the foundation of the SaaS operating
      model and ARR bridge.
    segment: subscription
    slug: mrr
    calc:
      expr: active_subscriptions * avg_monthly_price
      inputs:
      - active_subscriptions
      - avg_monthly_price
  Allverticalfarmingsaas-arr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Annualized run-rate of recurring subscription revenue.
    id: 1017
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: ARR = MRR × 12
    name: Annual Recurring Revenue (ARR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 6000000
    targetRangeLow: 600000
    tech: FINTECH
    type: Financial
    unit: Currency/year
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 10000000000
    validationRule: currency
    benchmarkKey: arr
    fpaWorkflow: Annual planning & valuation — the headline scale metric for SaaS
      boards and investors.
    segment: subscription
    slug: arr
    calc:
      expr: mrr * 12
      inputs: []
  Allverticalfarmingsaas-nrr:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Revenue retained and expanded from existing customers, net of churn
      and contraction.
    id: 1023
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: NRR = ((Starting MRR + Expansion − Contraction − Churn) / Starting
      MRR) × 100
    name: Net Revenue Retention (NRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 120
    targetRangeLow: 100
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 300
    validationRule: percentage_unbounded
    benchmarkKey: nrr
    fpaWorkflow: Expansion & retention modeling — the strongest signal of durable
      SaaS growth quality.
    segment: subscription
    slug: nrr
    calc:
      expr: (starting_mrr + expansion_mrr - contraction_mrr - churned_mrr) / starting_mrr
        * 100
      inputs:
      - starting_mrr
      - expansion_mrr
      - contraction_mrr
      - churned_mrr
  Allverticalfarmingsaas-gross-churn:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Percentage of recurring revenue lost to cancellations and downgrades.
    id: 1029
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: Gross Churn = (Churned MRR / Starting MRR) × 100
    name: Gross Revenue Churn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 1
    tech: FINTECH
    type: Operational
    unit: '%'
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_churn
    fpaWorkflow: Retention review — informs the renewal forecast and customer-success
      investment case.
    segment: subscription
    slug: gross_churn
    calc:
      expr: churned_mrr / starting_mrr * 100
      inputs:
      - churned_mrr
      - starting_mrr
  Allverticalfarmingsaas-cac:
    datasource:
    - Marketing spend records
    - CRM / Sales pipeline
    - General ledger
    description: Fully-loaded sales & marketing cost to acquire one new customer.
    id: 1035
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: CAC = Total Sales & Marketing Spend / New Customers Acquired
    name: Customer Acquisition Cost (CAC)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10000
    targetRangeLow: 500
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 10000000
    validationRule: currency
    benchmarkKey: cac
    fpaWorkflow: Go-to-market efficiency — feeds CAC payback and the marketing budget
      allocation.
    segment: subscription
    slug: cac
    calc:
      expr: sales_marketing_spend / new_customers
      inputs:
      - sales_marketing_spend
      - new_customers
  Allverticalfarmingsaas-ltv:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Expected gross-margin revenue from a customer over their lifetime.
    id: 1041
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: LTV = (Average Revenue per Account × Gross Margin %) / Churn Rate
    name: Customer Lifetime Value (LTV)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 50000
    targetRangeLow: 3000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: ltv
    fpaWorkflow: Unit-economics modeling — combined with CAC to gate growth-spend
      decisions.
    segment: subscription
    slug: ltv
    calc:
      expr: (avg_revenue_per_account * gross_margin_pct / 100) / churn_rate
      inputs:
      - avg_revenue_per_account
      - gross_margin_pct
      - churn_rate
  Allverticalfarmingsaas-ltv-cac:
    datasource:
    - Subscription billing records
    - Marketing spend records
    description: Ratio of customer lifetime value to acquisition cost — core SaaS
      unit economics.
    id: 1047
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: LTV:CAC = Customer Lifetime Value / Customer Acquisition Cost
    name: 'LTV : CAC Ratio'
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 3
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: ratio
    benchmarkKey: ltv_cac
    fpaWorkflow: Investment efficiency — a board-level guardrail (target ≥ 3:1) for
      scaling spend.
    segment: subscription
    slug: ltv_cac
    calc:
      expr: ltv / cac
      inputs: []
  Allverticalfarmingsaas-rule-of-40:
    datasource:
    - Subscription billing records
    - Financial statements
    description: Balance of growth and profitability for recurring-revenue businesses.
    id: 1053
    industry: Vertical Farming
    industryTags:
    - SaaS
    methodology: Rule of 40 = Revenue Growth % + Profit Margin %
    name: Rule of 40
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 200
    validationRule: percentage_unbounded
    benchmarkKey: rule_of_40
    fpaWorkflow: Growth-vs-profitability review — a single composite health score
      for SaaS planning.
    segment: subscription
    slug: rule_of_40
    calc:
      expr: revenue_growth_pct + profit_margin_pct
      inputs:
      - revenue_growth_pct
      - profit_margin_pct
