metrics:
  HcVol911CatalogMetricKey01:
    id: 911
    name: Patient Volume
    description: Count of patient encounters or admissions in the reporting period
      (aggregated, de-identified).
    industry: Healthcare
    type: Operational
    unit: Count
    methodology: Sum of distinct encounter or admission records in period
    datasource:
    - De-identified operational census export
    - Scheduling utilization summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 500
    targetRangeHigh: 50000
    tech: DEEP TECH
    frequency: weekly
    higherIsBetter: true
    fpaWorkflow: Capacity planning — volume drives staffing ratios and revenue forecasts.
    segment: provider
    slug: patient_volume
    input: true
  HcLos912CatalogMetricKey02:
    id: 912
    name: Average Length of Stay
    description: Mean inpatient days per discharge (aggregated by service line).
    industry: Healthcare
    type: Operational
    unit: Days
    methodology: ALOS = Total Inpatient Days / Discharges
    datasource:
    - De-identified operational census export
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 3
    targetRangeHigh: 8
    tech: DEEP TECH
    validationRule: days
    frequency: monthly
    higherIsBetter: false
    fpaWorkflow: Throughput and bed management — ALOS affects margin per bed and backlog.
    segment: provider
    slug: average_length_of_stay
    calc:
      expr: inpatient_days / discharges
      inputs:
      - inpatient_days
      - discharges
  HcReadmit913CatalogMetricKey03:
    id: 913
    name: Readmission Rate (30-day proxy)
    description: Share of discharges with a related readmission within 30 days (aggregated
      quality signal).
    industry: Healthcare
    type: Operational
    unit: '%'
    methodology: Readmissions / Eligible Discharges × 100 (de-identified cohort)
    datasource:
    - De-identified quality outcomes summary
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 5
    targetRangeHigh: 15
    tech: DEEP TECH
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    frequency: monthly
    higherIsBetter: false
    fpaWorkflow: Quality-to-cost — readmissions drive variable cost and value-based
      contract risk.
    segment: quality
    slug: readmission_rate_30d
    calc:
      expr: readmissions / eligible_discharges * 100
      inputs:
      - readmissions
      - eligible_discharges
  HcStaff914CatalogMetricKey04:
    id: 914
    name: Staffing Ratio
    description: Clinical staff hours per occupied bed or per encounter (aggregated).
    industry: Healthcare
    type: Operational
    unit: Ratio
    methodology: Staff Hours / Occupied Beds (or / Encounters) for the period
    datasource:
    - Scheduling utilization summary
    - Payroll hours summary (no employee names in bronze templates)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 0.5
    targetRangeHigh: 3
    tech: DEEP TECH
    frequency: weekly
    higherIsBetter: true
    fpaWorkflow: Labor efficiency — primary driver of operating margin in acute settings.
    segment: provider
    slug: staffing_ratio
    calc:
      expr: staff_hours / occupied_beds
      inputs:
      - staff_hours
      - occupied_beds
  HcDenial915CatalogMetricKey05:
    id: 915
    name: Claim Denial Rate
    description: Share of claims denied on first submission (revenue cycle quality).
    industry: Healthcare
    type: Financial
    unit: '%'
    methodology: Denied Claims / Submitted Claims × 100
    datasource:
    - Revenue cycle summary export
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeLow: 3
    targetRangeHigh: 12
    tech: FINTECH
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    frequency: monthly
    higherIsBetter: false
    fpaWorkflow: Cash collection — denials delay revenue recognition and increase
      AR days.
    segment: revenue_cycle
    slug: claim_denial_rate
    calc:
      expr: denied_claims / submitted_claims * 100
      inputs:
      - denied_claims
      - submitted_claims
  Allhealthcaresaas-mrr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Normalized recurring subscription revenue billed in a month.
    id: 1014
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: MRR = Σ (Active Subscriptions × Monthly Subscription Price)
    name: Monthly Recurring Revenue (MRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 500000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 1000000000
    validationRule: currency
    benchmarkKey: mrr
    fpaWorkflow: Recurring-revenue forecast — the foundation of the SaaS operating
      model and ARR bridge.
    segment: subscription
    slug: mrr
    calc:
      expr: active_subscriptions * avg_monthly_price
      inputs:
      - active_subscriptions
      - avg_monthly_price
  Allhealthcaresaas-arr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Annualized run-rate of recurring subscription revenue.
    id: 1020
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: ARR = MRR × 12
    name: Annual Recurring Revenue (ARR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 6000000
    targetRangeLow: 600000
    tech: FINTECH
    type: Financial
    unit: Currency/year
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 10000000000
    validationRule: currency
    benchmarkKey: arr
    fpaWorkflow: Annual planning & valuation — the headline scale metric for SaaS
      boards and investors.
    segment: subscription
    slug: arr
    calc:
      expr: mrr * 12
      inputs: []
  Allhealthcaresaas-nrr:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Revenue retained and expanded from existing customers, net of churn
      and contraction.
    id: 1026
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: NRR = ((Starting MRR + Expansion − Contraction − Churn) / Starting
      MRR) × 100
    name: Net Revenue Retention (NRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 120
    targetRangeLow: 100
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 300
    validationRule: percentage_unbounded
    benchmarkKey: nrr
    fpaWorkflow: Expansion & retention modeling — the strongest signal of durable
      SaaS growth quality.
    segment: subscription
    slug: nrr
    calc:
      expr: (starting_mrr + expansion_mrr - contraction_mrr - churned_mrr) / starting_mrr
        * 100
      inputs:
      - starting_mrr
      - expansion_mrr
      - contraction_mrr
      - churned_mrr
  Allhealthcaresaas-gross-churn:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Percentage of recurring revenue lost to cancellations and downgrades.
    id: 1032
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: Gross Churn = (Churned MRR / Starting MRR) × 100
    name: Gross Revenue Churn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 1
    tech: FINTECH
    type: Operational
    unit: '%'
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_churn
    fpaWorkflow: Retention review — informs the renewal forecast and customer-success
      investment case.
    segment: subscription
    slug: gross_churn
    calc:
      expr: churned_mrr / starting_mrr * 100
      inputs:
      - churned_mrr
      - starting_mrr
  Allhealthcaresaas-cac:
    datasource:
    - Marketing spend records
    - CRM / Sales pipeline
    - General ledger
    description: Fully-loaded sales & marketing cost to acquire one new customer.
    id: 1038
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: CAC = Total Sales & Marketing Spend / New Customers Acquired
    name: Customer Acquisition Cost (CAC)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10000
    targetRangeLow: 500
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 10000000
    validationRule: currency
    benchmarkKey: cac
    fpaWorkflow: Go-to-market efficiency — feeds CAC payback and the marketing budget
      allocation.
    segment: subscription
    slug: cac
    calc:
      expr: sales_marketing_spend / new_customers
      inputs:
      - sales_marketing_spend
      - new_customers
  Allhealthcaresaas-ltv:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Expected gross-margin revenue from a customer over their lifetime.
    id: 1044
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: LTV = (Average Revenue per Account × Gross Margin %) / Churn Rate
    name: Customer Lifetime Value (LTV)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 50000
    targetRangeLow: 3000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: ltv
    fpaWorkflow: Unit-economics modeling — combined with CAC to gate growth-spend
      decisions.
    segment: subscription
    slug: ltv
    calc:
      expr: (avg_revenue_per_account * gross_margin_pct / 100) / churn_rate
      inputs:
      - avg_revenue_per_account
      - gross_margin_pct
      - churn_rate
  Allhealthcaresaas-ltv-cac:
    datasource:
    - Subscription billing records
    - Marketing spend records
    description: Ratio of customer lifetime value to acquisition cost — core SaaS
      unit economics.
    id: 1050
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: LTV:CAC = Customer Lifetime Value / Customer Acquisition Cost
    name: 'LTV : CAC Ratio'
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 3
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: ratio
    benchmarkKey: ltv_cac
    fpaWorkflow: Investment efficiency — a board-level guardrail (target ≥ 3:1) for
      scaling spend.
    segment: subscription
    slug: ltv_cac
    calc:
      expr: ltv / cac
      inputs: []
  Allhealthcaresaas-rule-of-40:
    datasource:
    - Subscription billing records
    - Financial statements
    description: Balance of growth and profitability for recurring-revenue businesses.
    id: 1056
    industry: Healthcare
    industryTags:
    - SaaS
    methodology: Rule of 40 = Revenue Growth % + Profit Margin %
    name: Rule of 40
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 200
    validationRule: percentage_unbounded
    benchmarkKey: rule_of_40
    fpaWorkflow: Growth-vs-profitability review — a single composite health score
      for SaaS planning.
    segment: subscription
    slug: rule_of_40
    calc:
      expr: revenue_growth_pct + profit_margin_pct
      inputs:
      - revenue_growth_pct
      - profit_margin_pct
  healthcare.provider.bed_occupancy_rate:
    id: 1400
    name: Bed Occupancy Rate
    industry: Healthcare
    segment: provider
    slug: bed_occupancy_rate
    type: Operational
    unit: '%'
    methodology: Bed Occupancy = (Occupied Beds / Available Beds) × 100
    description: Bed Occupancy Rate (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: occupied_beds / available_beds * 100
      inputs:
      - occupied_beds
      - available_beds
  healthcare.provider.or_utilization:
    id: 1401
    name: Operating Room Utilization
    industry: Healthcare
    segment: provider
    slug: or_utilization
    type: Operational
    unit: '%'
    methodology: OR Utilization = (OR Time Used / OR Time Available) × 100
    description: Operating Room Utilization (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: or_time_used / or_time_available * 100
      inputs:
      - or_time_used
      - or_time_available
  healthcare.provider.ed_wait_time:
    id: 1402
    name: ED Wait Time
    industry: Healthcare
    segment: provider
    slug: ed_wait_time
    type: Operational
    unit: Minutes
    methodology: Mean minutes from ED arrival to provider (directly measured).
    description: ED Wait Time (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    input: true
  healthcare.provider.case_mix_index:
    id: 1403
    name: Case Mix Index
    industry: Healthcare
    segment: provider
    slug: case_mix_index
    type: Operational
    unit: Index
    methodology: Average DRG weight across discharges (directly measured).
    description: Case Mix Index (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    input: true
  healthcare.provider.cost_per_discharge:
    id: 1404
    name: Cost per Discharge
    industry: Healthcare
    segment: provider
    slug: cost_per_discharge
    type: Financial
    unit: Currency
    methodology: Cost per Discharge = Total Operating Cost / Discharges
    description: Cost per Discharge (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: total_operating_cost / discharges
      inputs:
      - total_operating_cost
      - discharges
  healthcare.revenue_cycle.ar_days:
    id: 1405
    name: AR Days
    industry: Healthcare
    segment: revenue_cycle
    slug: ar_days
    type: Financial
    unit: Days
    methodology: AR Days = (Accounts Receivable / Net Patient Revenue) × Days
    description: AR Days (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: accounts_receivable / net_patient_revenue * days
      inputs:
      - accounts_receivable
      - net_patient_revenue
      - days
  healthcare.revenue_cycle.clean_claim_rate:
    id: 1406
    name: Clean Claim Rate
    industry: Healthcare
    segment: revenue_cycle
    slug: clean_claim_rate
    type: Financial
    unit: '%'
    methodology: Clean Claim Rate = (Clean Claims / Total Claims) × 100
    description: Clean Claim Rate (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: clean_claims / total_claims * 100
      inputs:
      - clean_claims
      - total_claims
  healthcare.quality.mortality_rate:
    id: 1407
    name: Inpatient Mortality Rate
    industry: Healthcare
    segment: quality
    slug: mortality_rate
    type: Operational
    unit: '%'
    methodology: Mortality Rate = (Inpatient Deaths / Discharges) × 100
    description: Inpatient Mortality Rate (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: inpatient_deaths / discharges * 100
      inputs:
      - inpatient_deaths
      - discharges
  healthcare.quality.infection_rate:
    id: 1408
    name: Healthcare-Associated Infection Rate
    industry: Healthcare
    segment: quality
    slug: infection_rate
    type: Operational
    unit: Per 1000 patient-days
    methodology: HAI Rate = (Infections / Patient Days) × 1000
    description: Healthcare-Associated Infection Rate (aggregated, de-identified).
    datasource:
    - De-identified operational export
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: true
    calc:
      expr: infections / patient_days * 1000
      inputs:
      - infections
      - patient_days
