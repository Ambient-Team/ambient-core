metrics:
  MfgOee901CatalogMetricKey01:
    id: 901
    name: Overall Equipment Effectiveness (OEE)
    description: Composite utilization of manufacturing equipment (availability ×
      performance × quality).
    industry: Manufacturing
    type: Operational
    unit: '%'
    methodology: OEE = Availability × Performance × Quality (each as % of ideal)
    datasource:
    - MES production export
    - Machine run-time counters
    sensorFieldData:
    - Machine state sensors
    - Cycle time counters
    status: data needed
    targetRangeLow: 60
    targetRangeHigh: 85
    tech: DEEP TECH
    validationRule: percentage
    validRange:
      hardMin: 0
      hardMax: 100
    benchmarkKey: oee
    frequency: weekly
    higherIsBetter: true
    fpaWorkflow: Capacity planning — ties shop-floor efficiency to unit economics
      and capex cases.
  MfgScrap902CatalogMetricKey02:
