metrics:
  1cvcTcHNt1VYX867UUG7:
    datasource:
    - Financial statements
    - Loan documents
    description: Ratio of net operating income to annual debt payments.
    id: 8
    industry: Real Estate
    methodology: DSCR = Net Operating Income / Annual Debt Service
    name: Debt Service Coverage Ratio (DSCR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 2.5
    targetRangeLow: 1.5
    tech: FINTECH
    type: Financial
    unit: Number
    benchmarkKey: dscr
    fpaWorkflow: Liquidity & covenant review — lender DSCR tests and monthly board
      liquidity pack.
    financialImpact: Covenant headroom — breach risk for debt service and refinancing
    operationalSignal: NOI and opex from property operations feed DSCR numerator and
      denominator
    segment: financial
    slug: dscr
    calc:
      expr: noi / annual_debt_service
      inputs:
      - annual_debt_service
  EDCn8khPJg44trzt4JTA:
    datasource:
    - Property management systems
    - Rental vacancy reports
    description: Percentage of rental units that are unoccupied.
    id: 9
    industry: Real Estate
    methodology: Vacancy Rate = (Number of Vacant Units / Total Units) * 100
    name: Vacancy Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 7
    targetRangeLow: 3
    tech: DEEP TECH
    type: Operational
    unit: '%'
    segment: operations
    slug: vacancy_rate
    calc:
      expr: vacant_units / total_units * 100
      inputs:
      - vacant_units
      - total_units
  Ob4nc825yNcKAA91kCua:
    datasource:
    - Mortgage documents
    - Property appraisal reports
    description: Ratio of mortgage loan amount to the property's appraised value.
    id: 7
    industry: Real Estate
    methodology: LTV = (Mortgage Amount / Property Appraised Value) * 100
    name: Loan-to-Value Ratio (LTV)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 75
    targetRangeLow: 60
    tech: FINTECH
    type: Financial
    unit: '%'
    segment: financial
    slug: loan_to_value
    calc:
      expr: mortgage_amount / appraised_value * 100
      inputs:
      - mortgage_amount
      - appraised_value
  VLDD4ijNDixuJ7EDJtw3:
    datasource:
    - Property valuation reports
    - Rental income records
    description: Property price divided by gross rental income, used for quick valuation.
    id: 6
    industry: Real Estate
    methodology: GRM = Property Price / Gross Rental Income
    name: Gross Rent Multiplier (GRM)
    sensorFieldData:
    - None directly applicable. (i.e. cannot verify and requires personnel supervision)
    status: data needed
    targetRangeHigh: 15
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: Number
    segment: financial
    slug: grm
    calc:
      expr: property_price / gross_rental_income
      inputs:
      - property_price
      - gross_rental_income
  YsoV0l2DLsptgTldBESm:
    datasource:
    - Financial statements
    - Property management systems
    description: Income generated from a property after deducting operating expenses.
    id: 2
    industry: Real Estate
    methodology: NOI = Gross Rental Income - Operating Expenses
    name: Net Operating Income (NOI)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 800000
    targetRangeLow: 400000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    segment: financial
    slug: noi
    calc:
      expr: gross_rental_income - operating_expenses
      inputs:
      - gross_rental_income
      - operating_expenses
  o4HkbNgvPm6RAPEcAzHV:
    datasource:
    - Financial statements
    - Property purchase records
    - Sale records
    description: Percentage return on investment relative to its cost.
    id: 1
    industry: Real Estate
    methodology: ROI = ((Net Profit / Cost of Investment) * 100)
    name: Return on Investment (ROI)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10
    targetRangeLow: 6
    tech: FINTECH
    type: Financial
    unit: Percentage
    segment: financial
    slug: roi
    calc:
      expr: net_profit / cost_of_investment * 100
      inputs:
      - net_profit
      - cost_of_investment
  o5PSXR0Vw3Jy35QyRrJ8:
    datasource:
    - Financial statements
    - Rental income records
    description: Net income from a property after mortgage and operating expenses.
    id: 4
    industry: Real Estate
    methodology: Cash Flow = Rental Income - Operating Expenses - Debt Service
    name: Cash Flow
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 500000
    targetRangeLow: 250000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    segment: financial
    slug: re_cash_flow
    calc:
      expr: rental_income - operating_expenses - debt_service
      inputs:
      - rental_income
      - operating_expenses
      - debt_service
  rbIvVbYWRuUUr4rzZGRH:
    datasource:
    - Property valuation reports
    - Financial statements
    description: Ratio of NOI to property value, used to estimate potential return.
    id: 3
    industry: Real Estate
    methodology: Cap Rate = (NOI / Property Value) * 100
    name: Capitalization Rate (Cap Rate)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 8
    targetRangeLow: 5
    tech: FINTECH
    type: Financial
    unit: Percentage
    benchmarkKey: cap_rate
    fpaWorkflow: Valuation & lender reporting — yield sensitivity for divestiture
      and acquisition cases.
    financialImpact: Yield and valuation — cap rate moves drive NAV and lender collateral
      tests
    operationalSignal: NOI from operations and appraisal inputs drive cap rate numerator
      and denominator
    segment: financial
    slug: cap_rate
    calc:
      expr: noi / property_value * 100
      inputs:
      - property_value
  wCpkOtGniudQu8pSh22k:
    datasource:
    - Financial statements
    - Investment records
    description: Annual return on invested cash.
    id: 5
    industry: Real Estate
    methodology: Cash-on-Cash Return = (Net Cash Flow / Initial Cash Investment) *
      100
    name: Cash-on-Cash Return
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 12
    targetRangeLow: 8
    tech: FINTECH
    type: Financial
    unit: Percentage
    segment: financial
    slug: cash_on_cash_return
    calc:
      expr: net_cash_flow / initial_cash_investment * 100
      inputs:
      - net_cash_flow
      - initial_cash_investment
  Allrealestatesaas-mrr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Normalized recurring subscription revenue billed in a month.
    id: 1010
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: MRR = Σ (Active Subscriptions × Monthly Subscription Price)
    name: Monthly Recurring Revenue (MRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 500000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 1000000000
    validationRule: currency
    benchmarkKey: mrr
    fpaWorkflow: Recurring-revenue forecast — the foundation of the SaaS operating
      model and ARR bridge.
    segment: subscription
    slug: mrr
    calc:
      expr: active_subscriptions * avg_monthly_price
      inputs:
      - active_subscriptions
      - avg_monthly_price
  Allrealestatesaas-arr:
    datasource:
    - Subscription billing records
    - CRM / Sales pipeline
    description: Annualized run-rate of recurring subscription revenue.
    id: 1016
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: ARR = MRR × 12
    name: Annual Recurring Revenue (ARR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 6000000
    targetRangeLow: 600000
    tech: FINTECH
    type: Financial
    unit: Currency/year
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 10000000000
    validationRule: currency
    benchmarkKey: arr
    fpaWorkflow: Annual planning & valuation — the headline scale metric for SaaS
      boards and investors.
    segment: subscription
    slug: arr
    calc:
      expr: mrr * 12
      inputs: []
  Allrealestatesaas-nrr:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Revenue retained and expanded from existing customers, net of churn
      and contraction.
    id: 1022
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: NRR = ((Starting MRR + Expansion − Contraction − Churn) / Starting
      MRR) × 100
    name: Net Revenue Retention (NRR)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 120
    targetRangeLow: 100
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 300
    validationRule: percentage_unbounded
    benchmarkKey: nrr
    fpaWorkflow: Expansion & retention modeling — the strongest signal of durable
      SaaS growth quality.
    segment: subscription
    slug: nrr
    calc:
      expr: (starting_mrr + expansion_mrr - contraction_mrr - churned_mrr) / starting_mrr
        * 100
      inputs:
      - starting_mrr
      - expansion_mrr
      - contraction_mrr
      - churned_mrr
  Allrealestatesaas-gross-churn:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Percentage of recurring revenue lost to cancellations and downgrades.
    id: 1028
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: Gross Churn = (Churned MRR / Starting MRR) × 100
    name: Gross Revenue Churn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 1
    tech: FINTECH
    type: Operational
    unit: '%'
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_churn
    fpaWorkflow: Retention review — informs the renewal forecast and customer-success
      investment case.
    segment: subscription
    slug: gross_churn
    calc:
      expr: churned_mrr / starting_mrr * 100
      inputs:
      - churned_mrr
      - starting_mrr
  Allrealestatesaas-cac:
    datasource:
    - Marketing spend records
    - CRM / Sales pipeline
    - General ledger
    description: Fully-loaded sales & marketing cost to acquire one new customer.
    id: 1034
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: CAC = Total Sales & Marketing Spend / New Customers Acquired
    name: Customer Acquisition Cost (CAC)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 10000
    targetRangeLow: 500
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 10000000
    validationRule: currency
    benchmarkKey: cac
    fpaWorkflow: Go-to-market efficiency — feeds CAC payback and the marketing budget
      allocation.
    segment: subscription
    slug: cac
    calc:
      expr: sales_marketing_spend / new_customers
      inputs:
      - sales_marketing_spend
      - new_customers
  Allrealestatesaas-ltv:
    datasource:
    - Subscription billing records
    - Product usage logs
    description: Expected gross-margin revenue from a customer over their lifetime.
    id: 1040
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: LTV = (Average Revenue per Account × Gross Margin %) / Churn Rate
    name: Customer Lifetime Value (LTV)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 50000
    targetRangeLow: 3000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: ltv
    fpaWorkflow: Unit-economics modeling — combined with CAC to gate growth-spend
      decisions.
    segment: subscription
    slug: ltv
    calc:
      expr: (avg_revenue_per_account * gross_margin_pct / 100) / churn_rate
      inputs:
      - avg_revenue_per_account
      - gross_margin_pct
      - churn_rate
  Allrealestatesaas-ltv-cac:
    datasource:
    - Subscription billing records
    - Marketing spend records
    description: Ratio of customer lifetime value to acquisition cost — core SaaS
      unit economics.
    id: 1046
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: LTV:CAC = Customer Lifetime Value / Customer Acquisition Cost
    name: 'LTV : CAC Ratio'
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 5
    targetRangeLow: 3
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 100
    validationRule: ratio
    benchmarkKey: ltv_cac
    fpaWorkflow: Investment efficiency — a board-level guardrail (target ≥ 3:1) for
      scaling spend.
    segment: subscription
    slug: ltv_cac
    calc:
      expr: ltv / cac
      inputs: []
  Allrealestatesaas-rule-of-40:
    datasource:
    - Subscription billing records
    - Financial statements
    description: Balance of growth and profitability for recurring-revenue businesses.
    id: 1052
    industry: Real Estate
    industryTags:
    - SaaS
    methodology: Rule of 40 = Revenue Growth % + Profit Margin %
    name: Rule of 40
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: quarterly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 200
    validationRule: percentage_unbounded
    benchmarkKey: rule_of_40
    fpaWorkflow: Growth-vs-profitability review — a single composite health score
      for SaaS planning.
    segment: subscription
    slug: rule_of_40
    calc:
      expr: revenue_growth_pct + profit_margin_pct
      inputs:
      - revenue_growth_pct
      - profit_margin_pct
  real_estate.operations.same_store_noi_growth:
    id: 1058
    name: Same-Store NOI Growth
    description: Year-over-year NOI growth on stabilized comparable properties (property-operator
      view).
    industry: Real Estate
    type: Financial
    unit: '%'
    methodology: Same-Store NOI Growth = ((Current NOI − Prior NOI) / Prior NOI) ×
      100 on comparable set
    datasource:
    - Property management systems
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: quarterly
    tech: FINTECH
    higherIsBetter: true
    fpaWorkflow: Operating performance — excludes acquisition/disposition noise.
    segment: operations
    slug: same_store_noi_growth
    input: true
  real_estate.operations.operating_expense_ratio:
    id: 1059
    name: Operating Expense Ratio
    description: Operating expenses relative to effective gross income (property operations).
    industry: Real Estate
    type: Financial
    unit: '%'
    methodology: OER = (Operating Expenses / Effective Gross Income) × 100
    datasource:
    - Property management systems
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: quarterly
    tech: FINTECH
    higherIsBetter: false
    fpaWorkflow: Cost discipline — opex leakage vs revenue.
    segment: operations
    slug: operating_expense_ratio
    calc:
      expr: operating_expenses / effective_gross_income * 100
      inputs:
      - operating_expenses
      - effective_gross_income
  real_estate.operations.energy_cost_per_sf:
    id: 1060
    name: Energy Cost per Square Foot
    description: Energy spend per rentable square foot (aggregated portfolio).
    industry: Real Estate
    type: Operational
    unit: Currency
    methodology: Energy Cost per SF = Total Energy Cost / Rentable Square Feet
    datasource:
    - Energy bills
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: DEEP TECH
    higherIsBetter: false
    fpaWorkflow: Sustainability and opex — efficiency programs and capex planning.
    segment: operations
    slug: energy_cost_per_sf
    calc:
      expr: total_energy_cost / rentable_square_feet
      inputs:
      - total_energy_cost
      - rentable_square_feet
