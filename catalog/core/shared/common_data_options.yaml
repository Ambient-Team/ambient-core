    format: Document
    template: Document
    lastUpdated: '2024-07-31 14:25:07'
    dummyFields:
    - Date
    - Revenue_Streams
    - Operating_Expenses
    - Asset_Values
    - Liability_Amounts
    fields: []
    metricRefs:
      default:
      - Net Profit Margin
      Transportation:
      - Driver Turnover Rate
      Vertical Farming:
      - Labor Cost per Kilogram of Produce
      Healthcare:
      - Staffing Ratio
      Restaurants:
      - Labor Cost Percentage

  accounting_software:
