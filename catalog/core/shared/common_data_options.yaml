# Shared data-source templates expanded into every industry pack at generate time.
# metricRefs resolve to numeric metricIds for that industry after metrics are merged.

dataOptionTemplates:
  financial_statements:
    keySuffix: GvoI0Vg2YijGfgoBaqqe
    name: Financial statements
    description: Records of a company's financial activities (income, expenses, assets,
      liabilities).
    format: Document
    template: Financial Statement Template
    lastUpdated: '2024-07-31 14:25:05'
    dummyFields:
    - Date
    - Revenue_Streams
    - Operating_Expenses
    - Asset_Values
    - Liability_Amounts
    fields:
    - date
    - statement_type
    - period_start_date
    - period_end_date
    metricRefs:
      default:
      - Current Ratio
      - Gross Profit Margin
      - Operating Margin (EBIT)
      - Net Profit Margin
      - EBITDA Margin
      - Operating Cash Flow
      Real Estate:
      - Return on Investment (ROI)
      - Net Operating Income (NOI)
      - Capitalization Rate (Cap Rate)
      - Cash Flow
      - Cash-on-Cash Return
      - Debt Service Coverage Ratio (DSCR)

  hr_records:
