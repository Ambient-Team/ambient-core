templates:
  current-ratio:
    datasource:
    - Financial statements
    - Trial balance
    - Balance sheet
    description: 'Short-term liquidity: ability to cover current liabilities with current assets.'
    industryTags:
    - Corporate Finance
    - All
    methodology: Current Ratio = Current Assets / Current Liabilities
    name: Current Ratio
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 2
    targetRangeLow: 1.2
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 20
    validationRule: ratio
    benchmarkKey: current_ratio
    fpaWorkflow: Liquidity & solvency review — feeds covenant monitoring and the monthly board liquidity
      pack.
    calc:
      expr: current_assets / current_liabilities
      inputs:
      - current_assets
      - current_liabilities
  quick-ratio:
    datasource:
    - Financial statements
    - Trial balance
    - Balance sheet
    description: Acid-test liquidity excluding inventory — most conservative short-term solvency view.
    industryTags:
    - Corporate Finance
    - All
    methodology: Quick Ratio = (Current Assets − Inventory) / Current Liabilities
    name: Quick Ratio (Acid Test)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1.5
    targetRangeLow: 1
    tech: FINTECH
    type: Financial
    unit: Ratio
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 20
    validationRule: ratio
    benchmarkKey: quick_ratio
    fpaWorkflow: Liquidity stress testing — pairs with cash-flow forecasting for downside scenarios.
    calc:
      expr: (current_assets - inventory) / current_liabilities
      inputs:
      - current_assets
      - inventory
      - current_liabilities
  gross-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Share of revenue retained after the direct cost of goods sold.
    industryTags:
    - Corporate Finance
    - SaaS
    - All
    methodology: Gross Margin = ((Revenue − COGS) / Revenue) × 100
    name: Gross Profit Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 70
    targetRangeLow: 40
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: gross_margin
    fpaWorkflow: Unit-economics and pricing review — anchors contribution-margin and budget-vs-actual
      analysis.
    calc:
      expr: (revenue - cogs) / revenue * 100
      inputs:
      - revenue
      - cogs
  operating-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Operating profitability after operating expenses (EBIT margin).
    industryTags:
    - Corporate Finance
    - All
    methodology: Operating Margin = (Operating Income / Revenue) × 100
    name: Operating Margin (EBIT)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 25
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: operating_margin
    fpaWorkflow: Opex efficiency review — drives the monthly variance bridge and cost-control actions.
    calc:
      expr: operating_income / revenue * 100
      inputs:
      - operating_income
      - revenue
  ebitda-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Core operating cash profitability before interest, tax, depreciation and amortization.
    industryTags:
    - Corporate Finance
    - All
    methodology: EBITDA Margin = (EBITDA / Revenue) × 100
    name: EBITDA Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 30
    targetRangeLow: 15
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: ebitda_margin
    fpaWorkflow: Valuation & lender reporting — primary profitability proxy in models and covenant tests.
    calc:
      expr: ebitda / revenue * 100
      inputs:
      - ebitda
      - revenue
  net-margin:
    datasource:
    - Financial statements
    - General ledger
    description: Bottom-line profitability after all costs, interest and tax.
    industryTags:
    - Corporate Finance
    - All
    methodology: Net Profit Margin = (Net Income / Revenue) × 100
    name: Net Profit Margin
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 20
    targetRangeLow: 8
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 100
    validationRule: percentage
    benchmarkKey: net_margin
    fpaWorkflow: Board P&L reporting — the headline profitability line for the monthly close pack.
    calc:
      expr: net_income / revenue * 100
      inputs:
      - net_income
      - revenue
  revenue-growth:
    datasource:
    - Financial statements
    - General ledger
    description: Period-over-period revenue growth rate.
    industryTags:
    - Corporate Finance
    - SaaS
    - All
    methodology: Revenue Growth = ((Current Period Revenue − Prior Period Revenue) / Prior Period Revenue)
      × 100
    name: Revenue Growth Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 30
    targetRangeLow: 10
    tech: FINTECH
    type: Financial
    unit: '%'
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -100
      hardMax: 1000
    validationRule: percentage_unbounded
    benchmarkKey: revenue_growth
    fpaWorkflow: Growth planning — drives top-line forecast, hiring plan and the rolling re-forecast.
    calc:
      expr: (revenue - revenue_prior) / revenue_prior * 100
      inputs:
      - revenue
      - revenue_prior
  working-capital:
    datasource:
    - Financial statements
    - Balance sheet
    - Trial balance
    description: Operating liquidity available to fund day-to-day operations.
    industryTags:
    - Corporate Finance
    - All
    methodology: Working Capital = Current Assets − Current Liabilities
    name: Working Capital
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1000000
    targetRangeLow: 100000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -1000000000
      hardMax: 1000000000
    validationRule: currency_signed
    benchmarkKey: working_capital
    fpaWorkflow: Working-capital management — feeds the 13-week cash forecast and treasury planning.
    calc:
      expr: current_assets - current_liabilities
      inputs:
      - current_assets
      - current_liabilities
  dso:
    datasource:
    - Accounts receivable aging
    - Financial statements
    - General ledger
    description: Average number of days to collect cash after a sale.
    industryTags:
    - Corporate Finance
    - All
    methodology: DSO = (Accounts Receivable / Total Credit Sales) × Number of Days
    name: Days Sales Outstanding (DSO)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 45
    targetRangeLow: 30
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 365
    validationRule: days
    benchmarkKey: dso
    fpaWorkflow: Receivables & collections review — directly improves the cash-conversion cycle and forecast
      accuracy.
    calc:
      expr: accounts_receivable / total_credit_sales * days
      inputs:
      - accounts_receivable
      - total_credit_sales
      - days
  dpo:
    datasource:
    - Accounts payable aging
    - Financial statements
    - General ledger
    description: Average number of days the business takes to pay its suppliers.
    industryTags:
    - Corporate Finance
    - All
    methodology: DPO = (Accounts Payable / COGS) × Number of Days
    name: Days Payable Outstanding (DPO)
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 30
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 365
    validationRule: days
    benchmarkKey: dpo
    fpaWorkflow: Payables optimization — balances supplier terms against the cash-conversion cycle.
    calc:
      expr: accounts_payable / cogs * days
      inputs:
      - accounts_payable
      - cogs
      - days
  ccc:
    datasource:
    - Accounts receivable aging
    - Accounts payable aging
    - Inventory records
    description: Days to convert investments in inventory and receivables back into cash.
    industryTags:
    - Corporate Finance
    - All
    methodology: CCC = DSO + Days Inventory Outstanding − DPO
    name: Cash Conversion Cycle
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 60
    targetRangeLow: 20
    tech: FINTECH
    type: Financial
    unit: Days
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: -180
      hardMax: 365
    validationRule: days_signed
    benchmarkKey: ccc
    fpaWorkflow: Cash-efficiency program — a north-star working-capital KPI tracked in the treasury review.
    calc:
      expr: dso + days_inventory_outstanding - dpo
      inputs:
      - days_inventory_outstanding
  operating-cash-flow:
    datasource:
    - Financial statements
    - Bank statements
    - General ledger
    description: Cash generated by core operations during the period.
    industryTags:
    - Corporate Finance
    - All
    methodology: Operating Cash Flow = Net Income + Non-Cash Charges − Increase in Working Capital
    name: Operating Cash Flow
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 1000000
    targetRangeLow: 200000
    tech: FINTECH
    type: Financial
    unit: Currency (e.g., USD)
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: -1000000000
      hardMax: 1000000000
    validationRule: currency_signed
    benchmarkKey: operating_cash_flow
    fpaWorkflow: Cash-flow forecasting — the anchor of the direct/indirect cash-flow statement.
    calc:
      expr: net_income + non_cash_charges - increase_in_working_capital
      inputs:
      - net_income
      - non_cash_charges
      - increase_in_working_capital
  burn-rate:
    datasource:
    - Bank statements
    - Financial statements
    - General ledger
    description: Net cash consumed per month (negative net operating cash flow).
    industryTags:
    - SaaS
    - Corporate Finance
    - All
    methodology: Net Burn = Cash Out − Cash In (per month)
    name: Monthly Burn Rate
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 200000
    targetRangeLow: 50000
    tech: FINTECH
    type: Financial
    unit: Currency/month
    frequency: monthly
    higherIsBetter: false
    validRange:
      hardMin: 0
      hardMax: 100000000
    validationRule: currency
    benchmarkKey: burn_rate
    fpaWorkflow: Runway management — paired with cash balance to govern the spend plan and fundraising
      timing.
    calc:
      expr: cash_out - cash_in
      inputs:
      - cash_out
      - cash_in
  runway:
    datasource:
    - Bank statements
    - Financial statements
    description: Number of months of cash remaining at the current net burn rate.
    industryTags:
    - SaaS
    - Corporate Finance
    - All
    methodology: Runway (months) = Current Cash Balance / Monthly Net Burn
    name: Cash Runway
    sensorFieldData:
    - Not Applicable
    status: data needed
    targetRangeHigh: 24
    targetRangeLow: 12
    tech: FINTECH
    type: Financial
    unit: Months
    frequency: monthly
    higherIsBetter: true
    validRange:
      hardMin: 0
      hardMax: 240
    validationRule: number
    benchmarkKey: runway
    fpaWorkflow: Board & investor reporting — the survival metric that gates hiring and spend decisions.
    calc:
      expr: current_cash_balance / burn_rate
      inputs:
      - current_cash_balance
  headcount:
    name: Headcount (FTE)
    description: Period-end count of active full-time-equivalent employees. A directly measured input,
      not a derived ratio.
    type: Operational
    unit: Count
    methodology: Period-end count of active employees expressed as full-time equivalents (directly measured,
      not calculated).
    datasource:
    - HR records
    - Payroll records
    industryTags:
    - Corporate
    - All
    sensorFieldData:
    - Not Applicable
    status: data needed
    frequency: monthly
    tech: FINTECH
    input: true
